name: auto-sync

on:
  push:
    branches:
      - en
  workflow_dispatch:
    # 允许手动触发

permissions:
  contents: write

jobs:
  sync-file:
    runs-on: ubuntu-latest

    steps:
      # Step 1: 检出当前仓库代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: 下载文件并存储到仓库目录
      - name: Sync Files to HuggingFace
        env:
          TOKEN: ${{ secrets.HF_TOKEN }}
          NAME: ${{ secrets.GIT_NAME }}
          EMAIL: ${{ secrets.GIT_EMAIL }}
        run: |
          git clone https://oauth2:$TOKEN@huggingface.co/spaces/Genius-Society/web_tools ../hf_repo
          rm -rf ./*.py ./*.txt ./LICENSE ./.github ./.git ./.gitignore ./.gitattributes
          cp -rf ../hf_repo/.git ../hf_repo/README.md ./
          if [ -n "$(git status --porcelain)" ]; then
            echo "Files are different, committing changes..."
            git config --global user.name "$NAME"
            git config --global user.email "$EMAIL"
            git add .
            git commit -m "Auto sync at $(date +%Y-%m-%d)"
            git push
          else
            echo "Files are the same, no changes."
          fi
